name: EAS Build iOS & Submit to TestFlight

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: eas-build-ios
  cancel-in-progress: false

jobs:
  build-and-submit:
    name: Build iOS & Submit to TestFlight
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Expo and EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build iOS app on EAS
        run: eas build --platform ios --profile production --non-interactive

      - name: Decode App Store Connect API Key
        run: echo "${{ secrets.ASC_KEY_P8_BASE64 }}" | base64 --decode > ./asc-api-key.p8

      - name: Submit to TestFlight
        run: eas submit --platform ios --profile production --latest --non-interactive
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}

      - name: Cleanup API Key
        if: always()
        run: rm -f ./asc-api-key.p8
